<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmnC2mqOt2KguVm9Cy8dUzfL3fAhmlIbE",
    authDomain: "school-portal-7e016.firebaseapp.com",
    projectId: "school-portal-7e016",
    appId: "1:588178709968:web:79badaacdaa022ba076dd5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  //  PROTECT PAGE
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("User is logged in:", user.email);
    } else {
      // NOT logged in → kick them out
      window.location.href = "login.html";
    }
  });

  // LOGOUT
  window.logout = function() {
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
  }
</script>
<button onclick="logout()">Logout</button>
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.body.innerHTML += `<p>Welcome ${user.email}</p>`;
  }
});
